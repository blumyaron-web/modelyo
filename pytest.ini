[pytest]
# ── Test discovery ────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Output ────────────────────────────────────────────────────────────────
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)-8s] %(name)s: %(message)s
log_file = logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)-8s] %(name)s: %(message)s

# ── pytest-html report ────────────────────────────────────────────────────
addopts =
    --html=reports/report.html
    --self-contained-html
    --alluredir=reports/allure-results
    --reruns=2
    --reruns-delay=2
    -v

# ── Markers ───────────────────────────────────────────────────────────────
# Business-logic domain
markers =
    authentication: login / logout / credential validation
    catalog: product listing and sorting
    cart: shopping-cart operations
    checkout: end-to-end purchase flow
    posts: /posts REST resource
    # Tech layer
    ui: UI / browser tests (Playwright)
    api: REST API / HTTP tests
    playwright: tests that run inside a browser via Playwright
    rest: tests that call HTTP endpoints directly
    # QA method
    smoke: critical-path sanity checks
    regression: full regression coverage
    e2e: end-to-end multi-step journeys
    schema_validation: response / DOM schema checks
    crud: create / read / update / delete operations
    boundary: edge-case and boundary-value tests
    bonus: optional bonus scenarios
