name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Required for peaceiris/actions-gh-pages to push to the gh-pages branch
permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      # ── Load previous Allure history from gh-pages so trend charts accumulate ──
      - name: Load Allure history from gh-pages
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true        # gracefully handles first run (branch doesn't exist yet)
        with:
          ref: gh-pages
          path: gh-pages

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Node dependencies (Allure 3 CLI)
        run: npm ci

      - name: Install Chromium
        run: playwright install chromium --with-deps

      - name: Create output directories
        run: mkdir -p reports/allure-results logs test-artifacts

      # ── Restore history so this run's report shows trend across all past runs ──
      - name: Restore Allure history
        if: always()
        run: |
          if [ -d gh-pages/history ]; then
            cp -r gh-pages/history reports/allure-results/history
            echo "✓ History restored from gh-pages"
          else
            echo "No previous history found — this will be run #1"
          fi

      - name: Run API tests
        run: pytest tests/api -n auto --tb=short

      - name: Run UI tests (2 parallel workers, auto-retry on flakes)
        env:
          HEADLESS: "true"
          ARTIFACT_DIR: test-artifacts
        run: pytest tests/ui -n 2 --tb=short

      # ── Generate Allure 3 report (reads allurerc.mjs) ─────────────────────────
      - name: Generate Allure 3 report
        if: always()
        run: npx allure generate reports/allure-results

      # ── Publish to GitHub Pages (visible at https://<owner>.github.io/<repo>/) ─
      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: reports/allure-report
          keep_files: false

      # ── Upload artifacts for direct download from the Actions run ─────────────
      - name: Upload pytest-html report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-html-report
          path: reports/report.html
          retention-days: 14

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: reports/allure-report/
          retention-days: 14

      - name: Upload Allure raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: reports/allure-results/
          retention-days: 14

      - name: Upload failure artifacts (screenshots, DOM, traces)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-artifacts
          path: test-artifacts/
          retention-days: 14

      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log
          path: logs/pytest.log
          retention-days: 14
