name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Required for gh-pages deploy and PR comments
permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      # ── Load previous Allure history from gh-pages so trend charts accumulate ──
      - name: Load Allure history from gh-pages
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true        # gracefully handles first run (branch doesn't exist yet)
        with:
          ref: gh-pages
          path: gh-pages

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Node dependencies (Allure 3 CLI)
        run: npm ci

      - name: Install Chromium
        run: playwright install chromium --with-deps

      - name: Create output directories
        run: mkdir -p reports/allure-results logs test-artifacts

      - name: Run API tests
        run: pytest tests/api -n auto --tb=short

      - name: Run UI tests (2 parallel workers, auto-retry on flakes)
        env:
          HEADLESS: "true"
          ARTIFACT_DIR: test-artifacts
        run: pytest tests/ui -n 2 --tb=short

      # ── Generate Allure 3 report (reads allurerc.mjs) ─────────────────────────
      - name: Generate Allure 3 report
        if: always()
        run: |
          # ── Restore history so trend charts accumulate ──────────────────────
          # Allure reads history/ from inside allure-results before generating.
          if [ -d gh-pages/history ]; then
            echo "Restoring history from gh-pages/history/ ($(ls gh-pages/history | wc -l) files)"
            cp -r gh-pages/history reports/allure-results/history
          else
            echo "No previous history found — this run will seed it"
          fi

          npx allure awesome reports/allure-results \
            --output reports/allure-report \
            --name "QA Automation Suite" \
            --lang en

          # ── Persist history into the report output for the next run ────────
          # Allure 3 reads history from allure-results but does NOT write it
          # to the output directory automatically. Without this copy, gh-pages
          # never has a history/ folder and trends never accumulate.
          if [ -d reports/allure-results/history ]; then
            echo "Copying history to report output for gh-pages persistence"
            cp -r reports/allure-results/history reports/allure-report/history
          fi

          echo "=== Generated report structure ==="
          find reports/allure-report -maxdepth 3 | head -60

          # Prevent Jekyll from mangling Allure's JS/CSS (files starting with _)
          touch reports/allure-report/.nojekyll

      # ── Write Job Summary (visible on every Actions run page) ─────────────────
      - name: Write Job Summary
        if: always()
        run: |
          python src/utils/generate_summary.py \
            --results  reports/allure-results \
            --summary  reports/allure-report/summary.json \
            --report-url "https://blumyaron-web.github.io/modelyo/" \
            --run-url   "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --sha       "${{ github.sha }}"

      # ── Sticky PR comment (updates on every push to the PR) ───────────────────
      - name: Post Allure report link to PR
        uses: marocchino/sticky-pull-request-comment@v2
        if: always() && github.event_name == 'pull_request'
        with:
          header: allure-report
          message: |
            ## 🧪 Test Report — ${{ github.event.pull_request.head.sha && format('`{0}`', github.sha) || github.sha }}

            | Metric | Value |
            |--------|-------|
            | Workflow run | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |
            | Branch | `${{ github.head_ref }}` |
            | Commit | `${{ github.sha }}` |

            | Report | Link |
            |--------|------|
            | � Latest report | https://blumyaron-web.github.io/modelyo/ |
            | 📈 Trend graphs | https://blumyaron-web.github.io/modelyo/#/graphs |
            | 🕓 Per-test history | https://blumyaron-web.github.io/modelyo/#/history |

            > _Report updates automatically on each push to this PR._

      # ── Publish to GitHub Pages ───────────────────────────────────────────────
      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: reports/allure-report
          keep_files: false            # peaceiris handles history via the checkout above
          enable_jekyll: false

      # ── Upload artifacts for direct download from the Actions run ─────────────
      - name: Upload pytest-html report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-html-report
          path: reports/report.html
          retention-days: 14

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: reports/allure-report/
          retention-days: 14

      - name: Upload Allure raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: reports/allure-results/
          retention-days: 14

      - name: Upload failure artifacts (screenshots, DOM, traces)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-artifacts
          path: test-artifacts/
          retention-days: 14

      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log
          path: logs/pytest.log
          retention-days: 14
