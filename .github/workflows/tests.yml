name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Required for gh-pages deploy and PR comments
permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Load previous Allure history from gh-pages so trend charts accumulate ──
      - name: Load Allure history from gh-pages
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true        # gracefully handles first run (branch doesn't exist yet)
        with:
          ref: gh-pages
          path: gh-pages

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Node dependencies (Allure 3 CLI)
        run: npm ci

      - name: Install Chromium browser
        run: playwright install chromium --with-deps

      - name: Create output directories
        run: mkdir -p reports/allure-results logs test-artifacts

      - name: Run API tests
        run: pytest tests/api -n auto --tb=short

      - name: Run UI tests
        env:
          HEADLESS: "true"
          ARTIFACT_DIR: test-artifacts
        run: pytest tests/ui -n 2 --tb=short

      # ── Generate Allure 3 report ──────────────────────────────────────────────
      - name: Generate Allure report
        if: always()
        uses: ./.github/actions/allure-report

      # ── Write Job Summary (visible on every Actions run page) ─────────────────
      - name: Write job summary
        if: always()
        run: |
          python src/utils/generate_summary.py \
            --results  reports/allure-results \
            --summary  reports/allure-report/summary.json \
            --report-url "https://blumyaron-web.github.io/modelyo/" \
            --run-url   "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --sha       "${{ github.sha }}"

      # ── Sticky PR comment (updates on every push to the PR) ───────────────────
      - name: Post report link as PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: always() && github.event_name == 'pull_request'
        with:
          header: allure-report
          message: |
            ## Test Report -- ${{ github.event.pull_request.head.sha && format('`{0}`', github.sha) || github.sha }}

            | Metric | Value |
            |--------|-------|
            | Workflow run | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |
            | Branch | `${{ github.head_ref }}` |
            | Commit | `${{ github.sha }}` |

            | Report | Link |
            |--------|------|
            | � Latest report | https://blumyaron-web.github.io/modelyo/ |
            | 📈 Trend graphs | https://blumyaron-web.github.io/modelyo/#/graphs |
            | 🕓 Per-test history | https://blumyaron-web.github.io/modelyo/#/history |

            > _Report updates automatically on each push to this PR._

      # ── Publish to GitHub Pages ───────────────────────────────────────────────
      - name: Deploy report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: reports/allure-report
          keep_files: false            # peaceiris handles history via the checkout above
          enable_jekyll: false

      # ── Upload artifacts for direct download from the Actions run ─────────────
      - name: Upload pytest-html report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-html-report
          path: reports/report.html
          retention-days: 14

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: reports/allure-report/
          retention-days: 14

      - name: Upload Allure raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: reports/allure-results/
          retention-days: 14

      - name: Upload failure artifacts (screenshots, DOM, traces)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-artifacts
          path: test-artifacts/
          retention-days: 14

      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log
          path: logs/pytest.log
          retention-days: 14
